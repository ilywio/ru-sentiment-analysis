<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastAPI Classifier Frontend</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h1>Text Classifier</h1>

    <textarea id="inputText" placeholder="Enter your comment..."></textarea>
    <button onclick="sendRequest()">Predict</button>

    <div class="result" id="resultBox">Result will appear here...</div>

    <script>
        async function sendRequest() {
            const text = document.getElementById("inputText").value;
            const resultBox = document.getElementById("resultBox");

            resultBox.innerText = "Loading...";

            try {
                const response = await fetch("http://localhost:8000/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                resultBox.innerText = data.predicted_class;
            } catch (error) {
                resultBox.innerText = "Error: " + error.message;
            }
        }
    </script>

</body>

</html>
